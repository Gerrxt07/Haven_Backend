openapi: 3.0.3
info:
  title: Haven Backend HTTP API
  version: 0.1.0
  description: |
    OpenAPI document for the Haven backend HTTP surface.

    Base path is `/api/v1`.
    WebSocket upgrade endpoints (`/ws` and `/realtime/ws`) are not represented here.
servers:
  - url: http://localhost:8086/api/v1
    description: Local development
tags:
  - name: Health
  - name: Auth
  - name: Users
  - name: Friends
  - name: Chat
  - name: E2EE
paths:
  /health:
    get:
      tags: [Health]
      summary: Health check
      operationId: healthCheck
      responses:
        '200':
          description: Backend dependencies are healthy.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: One or more backend dependencies are down.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/register:
    post:
      tags: [Auth]
      summary: Register user
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: Registered user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/login:
    post:
      tags: [Auth]
      summary: Legacy password login
      description: Legacy login path kept for backward compatibility during SRP transition.
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/login/challenge:
    post:
      tags: [Auth]
      summary: Start SRP login
      operationId: loginChallenge
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginChallengeRequest'
      responses:
        '200':
          description: SRP challenge payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginChallengeResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/login/verify:
    post:
      tags: [Auth]
      summary: Complete SRP login
      operationId: loginVerify
      parameters:
        - name: x-srp-challenge-id
          in: header
          required: true
          description: Challenge id returned by `/auth/login/challenge`.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginVerifyRequest'
      responses:
        '200':
          description: Verified session and issued tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginVerifyResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh tokens
      operationId: refreshTokens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Refreshed access and refresh tokens.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokens'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/me:
    get:
      tags: [Auth]
      summary: Current authenticated user
      operationId: getAuthMe
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/email/verification/request:
    post:
      tags: [Auth]
      summary: Request email verification code
      operationId: requestEmailVerification
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationRequest'
      responses:
        '200':
          description: Verification request accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/email/verification/confirm:
    post:
      tags: [Auth]
      summary: Confirm email verification code
      operationId: confirmEmailVerification
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/EmailVerificationConfirmRequest'
      responses:
        '200':
          description: Email confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/2fa/setup:
    post:
      tags: [Auth]
      summary: Start two-factor setup
      operationId: setupTwoFactor
      security:
        - bearerAuth: []
      responses:
        '200':
          description: TOTP setup payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TwoFactorSetupResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/2fa/confirm:
    post:
      tags: [Auth]
      summary: Confirm two-factor setup
      operationId: confirmTwoFactor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorConfirmRequest'
      responses:
        '200':
          description: Two-factor confirmed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /auth/2fa/disable:
    post:
      tags: [Auth]
      summary: Disable two-factor
      operationId: disableTwoFactor
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TwoFactorDisableRequest'
      responses:
        '200':
          description: Two-factor disabled.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /users:
    post:
      tags: [Users]
      summary: Create user directly
      description: Low-level user creation path. Registration should prefer `/auth/register`.
      operationId: createUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '200':
          description: Created user.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by id
      operationId: getUser
      parameters:
        - $ref: '#/components/parameters/UserIdPath'
      responses:
        '200':
          description: User payload.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /users/me/avatar:
    post:
      tags: [Users]
      summary: Upload avatar
      operationId: uploadAvatar
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: JPG or PNG image, max 5 MB.
      responses:
        '200':
          description: Optimized avatar metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadResponse'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /media/avatars/{user_id}/avatar.webp:
    get:
      tags: [Users]
      summary: Get avatar image
      operationId: getAvatar
      parameters:
        - $ref: '#/components/parameters/UserIdPathLower'
      responses:
        '200':
          description: Avatar image in WebP format.
          content:
            image/webp:
              schema:
                type: string
                format: binary
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /friends:
    get:
      tags: [Friends]
      summary: List friends
      operationId: listFriends
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Accepted friend relations.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Friend'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /friends/request:
    post:
      tags: [Friends]
      summary: Send friend request
      operationId: sendFriendRequest
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendFriendRequest'
      responses:
        '200':
          description: Created friend request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /friends/requests/incoming:
    get:
      tags: [Friends]
      summary: List incoming friend requests
      operationId: listIncomingFriendRequests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Incoming friend requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FriendRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /friends/requests/outgoing:
    get:
      tags: [Friends]
      summary: List outgoing friend requests
      operationId: listOutgoingFriendRequests
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Outgoing friend requests.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/FriendRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /friends/requests/{request_id}/accept:
    post:
      tags: [Friends]
      summary: Accept friend request
      operationId: acceptFriendRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      responses:
        '200':
          description: Updated friend request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /friends/requests/{request_id}/decline:
    post:
      tags: [Friends]
      summary: Decline friend request
      operationId: declineFriendRequest
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/RequestIdPath'
      responses:
        '200':
          description: Updated friend request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FriendRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /servers:
    post:
      tags: [Chat]
      summary: Create server
      operationId: createServer
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateServerRequest'
      responses:
        '200':
          description: Created server.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Server'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /channels:
    post:
      tags: [Chat]
      summary: Create channel with server id in body
      operationId: createChannelDirect
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelDirectRequest'
      responses:
        '200':
          description: Created channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /messages:
    post:
      tags: [Chat]
      summary: Create message with channel id in body
      operationId: createMessageDirect
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageDirectRequest'
      responses:
        '200':
          description: Created message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /dm/threads:
    post:
      tags: [Chat]
      summary: Create direct-message thread
      operationId: createDmThread
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDmThreadRequest'
      responses:
        '200':
          description: Created DM thread summary.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmThreadSummary'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '409':
          $ref: '#/components/responses/ErrorConflict'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    get:
      tags: [Chat]
      summary: List direct-message threads
      operationId: listDmThreads
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/BeforeQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: DM thread summaries.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DmThreadSummary'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /dm/threads/{thread_id}/messages:
    post:
      tags: [Chat]
      summary: Create direct-message payload
      operationId: createDmMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ThreadIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateDmMessageRequest'
      responses:
        '200':
          description: Created DM message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DmMessage'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    get:
      tags: [Chat]
      summary: List direct-message payloads
      operationId: listDmMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ThreadIdPath'
        - $ref: '#/components/parameters/BeforeQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: DM messages.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DmMessage'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /servers/{server_id}/channels:
    post:
      tags: [Chat]
      summary: Create server channel
      operationId: createChannel
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateChannelRequest'
      responses:
        '200':
          description: Created channel.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    get:
      tags: [Chat]
      summary: List server channels
      operationId: listChannels
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ServerIdPath'
        - $ref: '#/components/parameters/BeforeQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Channel list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Channel'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /channels/{channel_id}/messages:
    post:
      tags: [Chat]
      summary: Create channel message
      operationId: createMessage
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChannelIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateMessageRequest'
      responses:
        '200':
          description: Created message.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
    get:
      tags: [Chat]
      summary: List channel messages
      operationId: listMessages
      security:
        - bearerAuth: []
      parameters:
        - $ref: '#/components/parameters/ChannelIdPath'
        - $ref: '#/components/parameters/BeforeQuery'
        - $ref: '#/components/parameters/LimitQuery'
      responses:
        '200':
          description: Message list.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/ErrorBadRequest'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /e2ee/keys/bundle:
    post:
      tags: [E2EE]
      summary: Upload public key bundle
      operationId: uploadKeyBundle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadKeyBundleRequest'
      responses:
        '200':
          description: Upload accepted.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OkResponse'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /e2ee/keys/bundle/{user_id}:
    get:
      tags: [E2EE]
      summary: Get public key bundle
      operationId: getPublicKeyBundle
      parameters:
        - $ref: '#/components/parameters/UserIdPathLower'
      responses:
        '200':
          description: Public key bundle.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicKeyBundle'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '500':
          $ref: '#/components/responses/ErrorInternal'
  /e2ee/keys/claim:
    post:
      tags: [E2EE]
      summary: Claim one-time prekey bundle
      operationId: claimPrekeyBundle
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClaimPrekeyRequest'
      responses:
        '200':
          description: Claimed key bundle with one-time prekey.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/KeyBundleWithPrekey'
        '401':
          $ref: '#/components/responses/ErrorUnauthorized'
        '404':
          $ref: '#/components/responses/ErrorNotFound'
        '422':
          $ref: '#/components/responses/ErrorValidation'
        '429':
          $ref: '#/components/responses/ErrorTooManyRequests'
        '500':
          $ref: '#/components/responses/ErrorInternal'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PASETO
  parameters:
    UserIdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    UserIdPathLower:
      name: user_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    RequestIdPath:
      name: request_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ServerIdPath:
      name: server_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ChannelIdPath:
      name: channel_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    ThreadIdPath:
      name: thread_id
      in: path
      required: true
      schema:
        type: integer
        format: int64
    BeforeQuery:
      name: before
      in: query
      required: false
      description: Cursor id for older records.
      schema:
        type: integer
        format: int64
    LimitQuery:
      name: limit
      in: query
      required: false
      description: Max rows to return.
      schema:
        type: integer
        format: int64
  responses:
    ErrorBadRequest:
      description: Bad request.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ErrorUnauthorized:
      description: Unauthorized.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ErrorNotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ErrorConflict:
      description: Conflict.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ErrorValidation:
      description: Validation error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ErrorTooManyRequests:
      description: Rate limit hit.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
    ErrorInternal:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorBody'
  schemas:
    ErrorBody:
      type: object
      required: [error]
      properties:
        error:
          type: string
    HealthResponse:
      type: object
      required: [status, postgres, dragonfly]
      properties:
        status:
          type: string
          example: ok
        postgres:
          type: string
          example: ok
        dragonfly:
          type: string
          example: ok
    AuthTokens:
      type: object
      required: [access_token, refresh_token, token_type, expires_in_seconds]
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in_seconds:
          type: integer
          format: int64
    RegisterRequest:
      type: object
      required:
        - username
        - display_name
        - email
        - srp_salt
        - srp_verifier
        - date_of_birth
        - locale
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 32
        display_name:
          type: string
          minLength: 1
          maxLength: 64
        email:
          type: string
          format: email
        srp_salt:
          type: string
          description: Base64 encoded SRP salt from client.
        srp_verifier:
          type: string
          description: Base64 encoded SRP verifier from client.
        password:
          type: string
          nullable: true
          description: Legacy optional password during transition.
        date_of_birth:
          type: string
          format: date
        locale:
          type: string
          minLength: 2
          maxLength: 10
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1
          maxLength: 128
        totp_code:
          type: string
          nullable: true
        backup_code:
          type: string
          nullable: true
